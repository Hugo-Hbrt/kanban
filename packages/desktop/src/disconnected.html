<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kanban — Runtime Disconnected</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1F2428;
    color: #E6EDF3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    -webkit-app-region: drag;
    user-select: none;
  }
  .container {
    text-align: center;
    max-width: 480px;
    padding: 40px;
  }
  .icon {
    font-size: 48px;
    margin-bottom: 24px;
    opacity: 0.6;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 12px;
    color: #E6EDF3;
  }
  p {
    font-size: 14px;
    line-height: 1.6;
    color: #8B949E;
    margin-bottom: 24px;
  }
  .actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    -webkit-app-region: no-drag;
  }
  button {
    background: #0084FF;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 10px 24px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: #339DFF; }
  button:active { background: #006ACC; }
  code {
    background: #2D3339;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 13px;
    color: #E6EDF3;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="icon">⚡</div>
    <h1>Runtime Disconnected</h1>
    <p>
      The Kanban runtime process is no longer running.
      Click <strong>Restart</strong> to start it again, or run
      <code>kanban</code> in your terminal.
    </p>
    <div class="actions">
      <button id="restart-btn">Restart</button>
    </div>
  </div>
  <script>
    document.getElementById("restart-btn").addEventListener("click", function () {
      if (window.desktop && window.desktop.restartRuntime) {
        window.desktop.restartRuntime();
      }
    });
  </script>
</body>
</html>
